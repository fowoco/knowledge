version: 2
updates:
  - package-ecosystem: pip
    directory: /fowoco-knowledge
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - area:knowledge
      - type:chore
      - priority:P2
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    labels:
      - area:platform
      - type:chore
      - priority:P2
    commit-message:
      prefix: chore
      include: scope
