name: Knowledge 설계 결정
description: 지식 스키마·출처 정책·검수 체계·데이터 계약 변경을 제안합니다.
title: "[Decision] "
labels: ["area:knowledge", "type:chore"]
body:
  - type: textarea
    id: context
    attributes:
      label: 해결할 문제와 제약조건
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 결정
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안과 제외 이유
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: 예상되는 장점과 비용
    validations:
      required: true
  - type: checkboxes
    id: adr
    attributes:
      label: 완료 기준
      options:
        - label: 결정 확정 시 `docs/adr`에 ADR을 추가합니다.
          required: true
