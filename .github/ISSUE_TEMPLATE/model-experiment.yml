name: Model 실험
description: Intent·Slot·응답 분류 모델의 비교 실험을 제안합니다.
title: "[Experiment] "
labels: ["enhancement"]
body:
  - type: input
    id: objective
    attributes:
      label: 실험 목표
      placeholder: 예) Intent Macro-F1 baseline 비교
    validations:
      required: true
  - type: textarea
    id: dataset
    attributes:
      label: 데이터와 분할 방식
      description: 출처, 건수, 라벨 분포, train/validation/test 분리 기준을 적습니다.
    validations:
      required: true
  - type: textarea
    id: baselines
    attributes:
      label: 비교 모델
      placeholder: TF-IDF + Linear SVM / KoELECTRA / LLM zero-shot
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: 평가 지표와 합격 기준
      placeholder: Macro-F1, 클래스별 Recall, 복합요청 Exact Match
    validations:
      required: true
  - type: checkboxes
    id: leakage
    attributes:
      label: 데이터 안전성
      options:
        - label: 평가 데이터를 프롬프트 예시나 학습 데이터로 사용하지 않습니다.
          required: true
        - label: 개인정보와 기업 식별정보가 제거되었습니다.
          required: true
