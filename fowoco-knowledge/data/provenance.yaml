version: 0.1.0
sources:
  TEAM_SYNTHETIC:
    description: 팀이 FOWOCO Workflow와 라벨 기준 검증을 위해 작성한 합성 문장
    may_train: true
    requirements:
      - 실제 기업 사례로 표현하지 않음
      - 두 명 교차 검수 후 Gold 승격
      - 개인정보와 실제 식별자 금지
  INTERVIEW_DERIVED_ANON:
    description: 익명 인터뷰에서 확인된 업무 패턴을 식별 불가능한 문장으로 재작성
    may_train: conditional
    requirements:
      - 원문 대화와 회사명을 저장하지 않음
      - 인터뷰 동의 범위를 확인
      - 구체적 개인·기업 정보 제거
review_statuses:
  - DRAFT
