version: 0.1.0
rules:
  - id: KOR-001
    rule: 한 문장에는 한 가지 행동만 작성한다.
  - id: KOR-002
    rule: 날짜는 YYYY년 M월 D일 요일 HH시 mm분 형식으로 쓴다.
  - id: KOR-003
    rule: 그 서류, 저쪽, 평소처럼 같은 대명사와 관용표현을 쓰지 않는다.
  - id: KOR-004
    rule: 기관명, 서류명, 장소명은 공식 명칭과 쉬운 설명을 함께 쓴다.
  - id: KOR-005
    rule: 해야 할 행동, 제출물, 기한, 제출처를 순서대로 쓴다.
  - id: KOR-006
    rule: 날짜, 금액, 인원, 문서번호는 생성하지 않고 입력값을 그대로 보존한다.
  - id: KOR-007
    rule: 급여·체류·고용변동 안내에는 문의 담당자와 확인 방법을 함께 제공한다.
  - id: KOR-008
    rule: 완료 기준이 서류 제출이면 확인 버튼 대신 제출 상태를 사용한다.
validation:
  max_sentence_length_chars: 60
  preferred_sentences_per_message: 4
  preserve_slot_types: [datetime, month, money, identifier, document_type]
